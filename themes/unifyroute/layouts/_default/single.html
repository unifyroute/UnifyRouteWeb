{{ define "main" }}
<article class="page-content">
  <div class="container">
    <div class="page-header">
      <h1>{{ .Title }}</h1>
      {{ if .Description }}
        <p class="page-description">{{ .Description }}</p>
      {{ end }}
    </div>

    <div class="page-body">
      {{ .Content }}
    </div>
  </div>
</article>

<style>
  .page-content {
    padding: 4rem 0;
  }

  .page-header {
    margin-bottom: 3rem;
    border-bottom: 2px solid var(--border-color);
    padding-bottom: 2rem;
  }

  .page-header h1 {
    margin-bottom: 0.5rem;
  }

  .page-description {
    font-size: 1.1rem;
    color: var(--text-secondary);
  }

  .page-body {
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--text-secondary);
  }

  .page-body h2 {
    margin-top: 2rem;
    margin-bottom: 1rem;
  }

  .page-body h3 {
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
  }

  .page-body ul,
  .page-body ol {
    margin: 1.5rem 0;
    padding-left: 2.5rem;
  }

  .page-body li {
    margin: 0.5rem 0;
  }

  .page-body pre {
    margin: 2rem 0;
  }

  .page-body img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin: 2rem 0;
  }

  @media (max-width: 768px) {
    .page-content {
      padding: 2rem 0;
    }

    .page-body {
      font-size: 1rem;
    }
  }
</style>
{{ end }}
