<header class="header">
  <div class="container">
    <div class="header-content">
      <div class="logo-section">
        <a href="{{ .Site.BaseURL }}" aria-label="UnifyRoute Home" class="logo-link">
          <img src="/images/logo.png" alt="UnifyRoute Logo" class="logo-img">
          <span class="logo-text"><span class="logo-unify" style="color: #f25221;">Unify</span><span class="logo-route" style="color: #4d4d4d;">Route</span></span>
        </a>
      </div>

      <!-- Search Bar (Mobile hidden initially) -->
      {{ if gt (len .Site.Pages) 5 }}
        <div class="search-container" style="order: 2;">
          <input type="search" id="search-input" class="search-input" placeholder="Search...">
          <div id="search-results" class="search-results"></div>
        </div>
      {{ end }}

      <nav class="navbar">
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <ul class="nav-menu">
          {{ $currentURL := .Permalink }}
          {{ range .Site.Menus.main }}
            {{ if eq .URL "#" }}
              <li>
                <span class="nav-item">{{ .Name }}</span>
              </li>
            {{ else }}
              <li>
                <a class="nav-item{{ if eq .URL $currentURL }} active{{ end }}" href="{{ .URL }}">
                  {{ .Name }}
                </a>
              </li>
            {{ end }}
          {{ end }}

          <li>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
              <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M11.0174 2.80157C6.37072 3.29221 2.75 7.22328 2.75 12C2.75 17.1086 6.89137 21.25 12 21.25C16.7767 21.25 20.7078 17.6293 21.1984 12.9826C19.8717 14.6669 17.8126 15.75 15.5 15.75C11.4959 15.75 8.25 12.5041 8.25 8.5C8.25 6.18738 9.33315 4.1283 11.0174 2.80157ZM1.25 12C1.25 6.06294 6.06294 1.25 12 1.25C12.7166 1.25 13.0754 1.82126 13.1368 2.27627C13.196 2.71398 13.0342 3.27065 12.531 3.57467C10.8627 4.5828 9.75 6.41182 9.75 8.5C9.75 11.6756 12.3244 14.25 15.5 14.25C17.5882 14.25 19.4172 13.1373 20.4253 11.469C20.7293 10.9658 21.286 10.804 21.7237 10.8632C22.1787 10.9246 22.75 11.2834 22.75 12C22.75 17.9371 17.9371 22.75 12 22.75C6.06294 22.75 1.25 17.9371 1.25 12Z" fill="currentColor"/></svg>
            </button>
          </li>

          <li>
            <button class="contact-btn" id="contact-btn" aria-label="Contact us">
              <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </svg>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<style>
  .header {
    background-color: var(--bg-primary);
    border-bottom: none;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 0;
  }

  .logo-section {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .logo-link {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .logo-img {
    height: 40px;
    width: auto;
    transition: var(--transition);
  }

  /* Logo adapts to dark/light mode */
  html.dark-mode .logo-img {
    filter: brightness(0.95) invert(1) hue-rotate(180deg);
  }

  html.light-mode .logo-img {
    filter: none;
  }

  @media (prefers-color-scheme: dark) {
    .logo-img {
      filter: brightness(0.95) invert(1) hue-rotate(180deg);
    }
  }

  .logo-text {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .logo-unify {
    color: #f25221 !important;
  }

  .logo-route {
    color: #4d4d4d !important;
  }

  html.dark-mode .logo-unify {
    color: #ff7a42 !important;
  }

  html.dark-mode .logo-route {
    color: #e0e0e0 !important;
  }

  html.light-mode .logo-unify {
    color: #f25221 !important;
  }

  html.light-mode .logo-route {
    color: #4d4d4d !important;
  }

  @media (prefers-color-scheme: dark) {
    .logo-unify {
      color: #ff7a42 !important;
    }

    .logo-route {
      color: #e0e0e0 !important;
    }
  }

  @media (prefers-color-scheme: light) {
    .logo-unify {
      color: #f25221 !important;
    }

    .logo-route {
      color: #4d4d4d !important;
    }
  }

  .navbar {
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .nav-menu {
    display: flex;
    list-style: none;
    gap: 2rem;
    align-items: center;
    margin: 0;
  }

  .nav-item {
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 400;
    transition: var(--transition);
    font-size: 0.9rem;
  }

  .nav-item:hover,
  .nav-item.active {
    color: var(--accent-color);
  }

  .theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .theme-toggle:hover {
    transform: scale(1.1);
  }

  .theme-toggle svg {
    width: 20px;
    height: 20px;
    color: var(--text-secondary);
  }

  .theme-toggle:hover svg {
    color: var(--accent-color);
  }

  .theme-icon {
    width: 20px;
    height: 20px;
    display: block;
  }

  .contact-btn {
    background-color: var(--accent-color);
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    border-radius: 6px;
  }

  .contact-btn:hover {
    background-color: var(--accent-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .contact-btn svg {
    width: 20px;
    height: 20px;
    color: white;
  }

  .nav-toggle {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    flex-direction: column;
    gap: 5px;
  }

  .nav-toggle span {
    width: 22px;
    height: 2px;
    background-color: var(--text-primary);
    border-radius: 1px;
    transition: var(--transition);
  }

  @media (max-width: 768px) {
    .nav-toggle {
      display: flex;
    }

    .nav-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      background-color: var(--bg-secondary);
      gap: 1rem;
      padding: 1.5rem 1rem;
    }

    .nav-menu.active {
      display: flex;
    }

    .navbar {
      gap: 0;
    }

    .search-container {
      display: none;
    }

    .logo-text {
      display: none;
    }

    .logo-section {
      gap: 8px;
    }
  }
</style>

<script>
  // Mobile menu toggle
  document.addEventListener('DOMContentLoaded', () => {
    const toggle = document.getElementById('nav-toggle');
    const menu = document.querySelector('.nav-menu');

    if (toggle && menu) {
      toggle.addEventListener('click', () => {
        menu.classList.toggle('active');
      });

      // Close menu when link is clicked
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          menu.classList.remove('active');
        });
      });
    }

    // Contact modal functionality
    const contactBtn = document.getElementById('contact-btn');
    const contactModal = document.getElementById('contact-modal');
    const modalOverlay = document.querySelector('.modal-overlay');
    const closeBtn = document.querySelector('.modal-close');
    const contactForm = document.getElementById('contact-form');

    if (contactBtn && contactModal) {
      contactBtn.addEventListener('click', () => {
        contactModal.classList.add('active');
      });

      if (modalOverlay) {
        modalOverlay.addEventListener('click', () => {
          contactModal.classList.remove('active');
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          contactModal.classList.remove('active');
        });
      }

      if (contactForm) {
        contactForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const formData = new FormData(contactForm);
          const data = Object.fromEntries(formData);

          try {
            const response = await fetch('https://formspree.io/f/mdawoobl', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(data),
            });

            const messageModal = document.getElementById('message-modal');
            const messageTitle = document.getElementById('message-title');
            const messageText = document.getElementById('message-text');
            const messageIcon = document.getElementById('message-icon');

            if (response.ok) {
              messageTitle.textContent = 'Thank You!';
              messageText.textContent = 'Thank you for contacting us! We will get back to you soon.';
              messageIcon.innerHTML = '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
              contactForm.reset();
              contactModal.classList.remove('active');
              messageModal.classList.add('active');
            } else {
              messageTitle.textContent = 'Error';
              messageText.textContent = 'There was an error sending your message. Please try again.';
              messageIcon.innerHTML = '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#f44336" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
              messageModal.classList.add('active');
            }
          } catch (error) {
            console.error('Error:', error);
            const messageModal = document.getElementById('message-modal');
            const messageTitle = document.getElementById('message-title');
            const messageText = document.getElementById('message-text');
            const messageIcon = document.getElementById('message-icon');

            messageTitle.textContent = 'Error';
            messageText.textContent = 'There was an error sending your message. Please try again.';
            messageIcon.innerHTML = '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#f44336" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
            messageModal.classList.add('active');
          }
        });
      }

      // Message modal close functionality
      const messageModal = document.getElementById('message-modal');
      const messageCloseBtn = document.getElementById('message-close-btn');
      const messageModalOverlay = document.querySelector('.message-modal .modal-overlay');
      const messageModalCloseBtn = document.querySelector('.message-modal .modal-close');

      if (messageCloseBtn) {
        messageCloseBtn.addEventListener('click', () => {
          messageModal.classList.remove('active');
        });
      }

      if (messageModalOverlay) {
        messageModalOverlay.addEventListener('click', () => {
          messageModal.classList.remove('active');
        });
      }

      if (messageModalCloseBtn) {
        messageModalCloseBtn.addEventListener('click', () => {
          messageModal.classList.remove('active');
        });
      }
    }
  });
</script>
